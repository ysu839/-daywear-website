<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAYWEAR® | Built for Tomorrow</title>
    <meta
      name="description"
      content="DAYWEAR® premium streetwear essentials designed for life."
    />
    <link rel="stylesheet" href="styles.css?v=12" />
  </head>
  <body>
    <svg aria-hidden="true" class="icon-sprite">
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m20 20-3.2-3.2"></path>
      </symbol>
      <symbol id="icon-user" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4.5 21a7.5 7.5 0 0 1 15 0"></path>
      </symbol>
      <symbol id="icon-bag" viewBox="0 0 24 24">
        <path d="M7 8h10l1 13H6L7 8Z"></path>
        <path d="M9 8a3 3 0 0 1 6 0"></path>
      </symbol>
      <symbol id="icon-heart" viewBox="0 0 24 24">
        <path d="M20.8 5.6a5.3 5.3 0 0 0-7.5 0L12 6.9l-1.3-1.3a5.3 5.3 0 1 0-7.5 7.5L12 22l8.8-8.9a5.3 5.3 0 0 0 0-7.5Z"></path>
      </symbol>
      <symbol id="icon-chevron-left" viewBox="0 0 24 24">
        <path d="m15 18-6-6 6-6"></path>
      </symbol>
      <symbol id="icon-chevron-right" viewBox="0 0 24 24">
        <path d="m9 18 6-6-6-6"></path>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"></path>
      </symbol>
      <symbol id="icon-minus" viewBox="0 0 24 24">
        <path d="M5 12h14"></path>
      </symbol>
      <symbol id="icon-close" viewBox="0 0 24 24">
        <path d="M18 6 6 18M6 6l12 12"></path>
      </symbol>
      <symbol id="icon-menu" viewBox="0 0 24 24">
        <path d="M4 7h16M4 12h16M4 17h16"></path>
      </symbol>
      <symbol id="icon-crown" viewBox="0 0 24 24">
        <path d="m3 8 4 4 5-8 5 8 4-4-2 11H5L3 8Z"></path>
      </symbol>
      <symbol id="icon-globe" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"></path>
      </symbol>
      <symbol id="icon-return" viewBox="0 0 24 24">
        <path d="M8 7H5v3"></path>
        <path d="M5.5 10A7.5 7.5 0 1 0 13 4.5"></path>
        <path d="M12 9v6M9 12h6"></path>
      </symbol>
      <symbol id="icon-shield" viewBox="0 0 24 24">
        <path d="M12 22s8-4 8-11V5l-8-3-8 3v6c0 7 8 11 8 11Z"></path>
        <path d="m9 12 2 2 4-5"></path>
      </symbol>
    </svg>

    <header class="site-header" data-header>
      <a class="brand" href="#home" aria-label="DAYWEAR home">
        <span class="brand-mark">DW</span>
        <span class="brand-name">DAYWEAR®</span>
      </a>

      <button class="icon-button menu-toggle" data-menu-toggle aria-label="Open menu">
        <svg><use href="#icon-menu"></use></svg>
      </button>

      <nav class="main-nav" data-nav aria-label="Primary navigation">
        <a href="#home" data-route="home">Home</a>
        <a href="#shop" data-route="shop">Shop</a>
        <a href="#collections" data-route="collections">Collections</a>
        <a href="#tracksuits" data-route="tracksuits">Tracksuits</a>
        <a href="#about" data-route="about">About</a>
        <a href="#lookbook" data-route="lookbook">Lookbook</a>
      </nav>

      <div class="nav-actions">
        <button class="nav-action" data-open-search type="button">
          <svg><use href="#icon-search"></use></svg>
          <span>Search</span>
        </button>
        <button class="nav-action" data-open-account type="button">
          <svg><use href="#icon-user"></use></svg>
          <span>Account</span>
        </button>
        <button class="nav-action" data-open-cart type="button">
          <svg><use href="#icon-bag"></use></svg>
          <span>Cart (<span data-cart-count>0</span>)</span>
        </button>
      </div>
    </header>

    <main id="app" class="app-shell" tabindex="-1"></main>

    <aside class="drawer" data-cart-drawer aria-hidden="true">
      <div class="drawer-backdrop" data-close-cart></div>
      <section class="drawer-panel" aria-label="Shopping cart">
        <div class="drawer-head">
          <div>
            <p class="eyebrow">Your bag</p>
            <h2>Cart</h2>
          </div>
          <button class="icon-button" data-close-cart aria-label="Close cart">
            <svg><use href="#icon-close"></use></svg>
          </button>
        </div>
        <div class="drawer-body" data-cart-items></div>
        <div class="drawer-foot">
          <div class="total-row">
            <span>Subtotal</span>
            <strong data-cart-total>€0,00</strong>
          </div>
          <a class="primary-button full-width" href="#checkout" data-close-cart>
            Continue to Checkout
          </a>
        </div>
      </section>
    </aside>

    <dialog class="modal" data-search-modal>
      <form method="dialog" class="modal-close-form">
        <button class="icon-button" aria-label="Close search">
          <svg><use href="#icon-close"></use></svg>
        </button>
      </form>
      <p class="eyebrow">Search DAYWEAR®</p>
      <label class="search-field">
        <svg><use href="#icon-search"></use></svg>
        <input data-search-input placeholder="Search tracksuits, hoodies, jackets" />
      </label>
      <div class="search-results" data-search-results></div>
    </dialog>

    <dialog class="modal account-modal" data-account-modal>
      <form method="dialog" class="modal-close-form">
        <button class="icon-button" aria-label="Close account">
          <svg><use href="#icon-close"></use></svg>
        </button>
      </form>
      <p class="eyebrow">DAYWEAR® account</p>
      <h2>Premium access</h2>
      <p>
        Save your wishlist, track orders, and get early access to limited
        essentials.
      </p>
      <label>
        Email
        <input type="email" placeholder="you@example.com" />
      </label>
      <label>
        Password
        <input type="password" placeholder="••••••••" />
      </label>
      <button class="primary-button full-width" type="button" data-login-demo>
        Sign In
      </button>
    </dialog>

    <div class="toast" data-toast role="status" aria-live="polite"></div>

    <script src="app.js?v=12" defer></script>
  </body>
</html>
